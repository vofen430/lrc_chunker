name: build-windows-onefile

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish, e.g. v0.1.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  windows-onefile:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: lrc-chunker-py38
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true
          miniforge-variant: Miniforge3
          miniforge-version: latest

      - name: Install Build Tooling
        shell: bash -el {0}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Run Tests
        shell: bash -el {0}
        run: |
          pytest -q tests/test_pipeline.py

      - name: Build Onefile EXE
        shell: bash -el {0}
        run: |
          pwsh -File ./tools/build_external_onefile.ps1

      - name: Smoke Test EXE
        shell: bash -el {0}
        run: |
          ./dist/lrc-processor-onefile.exe version
          ./dist/lrc-processor-onefile.exe self-test

      - name: Rename Artifact
        shell: bash -el {0}
        run: |
          cp ./dist/lrc-processor-onefile.exe ./dist/lrc-processor-onefile-windows-x86_64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrc-processor-onefile-windows-x86_64
          path: dist/lrc-processor-onefile-windows-x86_64.exe
          if-no-files-found: error

      - name: Resolve Release Tag
        id: release_tag
        shell: bash -el {0}
        run: |
          TAG=""
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish Release Asset
        if: steps.release_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/lrc-processor-onefile-windows-x86_64.exe
          generate_release_notes: true
