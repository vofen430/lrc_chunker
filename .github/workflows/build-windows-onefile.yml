name: build-windows-onefile

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-onefile:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: lrc-chunker-py38
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true
          miniforge-variant: Miniforge3
          miniforge-version: latest

      - name: Install Build Tooling
        shell: bash -el {0}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Run Tests
        shell: bash -el {0}
        run: |
          pytest -q tests/test_pipeline.py

      - name: Build Onefile EXE
        shell: bash -el {0}
        run: |
          pwsh -File ./tools/build_external_onefile.ps1

      - name: Smoke Test EXE
        shell: bash -el {0}
        run: |
          ./dist/lrc-processor-onefile.exe version
          ./dist/lrc-processor-onefile.exe self-test

      - name: Rename Artifact
        shell: bash -el {0}
        run: |
          cp ./dist/lrc-processor-onefile.exe ./dist/lrc-processor-onefile-windows-x86_64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrc-processor-onefile-windows-x86_64
          path: dist/lrc-processor-onefile-windows-x86_64.exe
          if-no-files-found: error

      - name: Publish Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lrc-processor-onefile-windows-x86_64.exe
          generate_release_notes: true
